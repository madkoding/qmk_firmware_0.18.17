name: Build Keyboards

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: qmkfm/qmk_cli:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Fix script permissions
        run: chmod +x util/list_keyboards.sh util/qmk_wrapper.sh

      - name: Fetch QMK library dependencies
        run: |
          mkdir -p lib
          [ -d lib/lufa/.git ] || git clone --depth 1 https://github.com/qmk/lufa.git lib/lufa
          [ -d lib/chibios/.git ] || git clone --depth 1 https://github.com/qmk/ChibiOS.git lib/chibios
          [ -d lib/chibios-contrib/.git ] || git clone --depth 1 https://github.com/qmk/ChibiOS-Contrib.git lib/chibios-contrib
          [ -d lib/vusb/.git ] || git clone --depth 1 https://github.com/qmk/v-usb.git lib/vusb
          [ -d lib/printf/.git ] || git clone --depth 1 https://github.com/qmk/printf.git lib/printf
          [ -d lib/pico-sdk/.git ] || git clone --depth 1 https://github.com/qmk/pico-sdk.git lib/pico-sdk

      - name: Restore bundled libs missing from this fork
        run: |
          if [ ! -f lib/lib8tion/lib8tion.h ] || [ ! -f lib/fnv/fnv.h ]; then
            rm -rf /tmp/qmk_upstream
            git clone --depth 1 --filter=blob:none --sparse --branch 0.18.17 https://github.com/qmk/qmk_firmware.git /tmp/qmk_upstream
            git -C /tmp/qmk_upstream sparse-checkout set lib/lib8tion lib/fnv
            mkdir -p lib
            cp -R /tmp/qmk_upstream/lib/lib8tion lib/lib8tion
            cp -R /tmp/qmk_upstream/lib/fnv lib/fnv
          fi

      - name: Build ${{ matrix.keyboard.name }}:${{ matrix.keyboard.keymap }}
        run: make ${{ matrix.keyboard.name }}:${{ matrix.keyboard.keymap }} SKIP_GIT=yes SKIP_QMK_CHECK=yes QMK_BIN=./util/qmk_wrapper.sh

    strategy:
      fail-fast: false
      matrix:
        keyboard:
          - { name: crkbd, keymap: zonekeyboards }
          - { name: sofle, keymap: zonekeyboards }
          - { name: lily58, keymap: zonekeyboards }
          - { name: lily58zk, keymap: zonekeyboards }
          - { name: reviung41, keymap: zonekeyboards }
          - { name: zkpad, keymap: default }
